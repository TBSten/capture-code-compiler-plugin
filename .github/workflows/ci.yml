name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  # ---------------------------------------------------------------------------
  # core-matrix: Kotlin × JDK の全 stable + 最新 pre-release を回す主要 matrix。
  #
  # Kotlin 2.0.0 以降の全 minor track (initial + latest patch
  # = 代表 2 cell × 4 tracks = 8 stable) + 最新 pre-release 1 つを含める。
  # 各 minor track の patch level 全数 (例 2.0.10/2.0.20) は CI コストの観点
  # から省略する (代表 patch level だけで drift 観察として十分)。
  #
  # JDK は 17 を stable tier、 21 は experimental tier (代表 versions のみ)。
  #
  # 各 cell の `ksp` 値は Kotlin version に追従する必要がある (Kotlin 2.0.0
  # baseline 用 KSP は 2.2.x 以降では `too old` エラーで refuse される) ため、
  # matrix `include` で kotlin → ksp の version mapping を明示する。
  # ---------------------------------------------------------------------------
  core-matrix:
    name: "core (kotlin=${{ matrix.kotlin }}, jdk=${{ matrix.jdk }})"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest"]
        jdk: ["17"]
        kotlin:
          # === 2.0.x track ===
          - "2.0.0"   # base — SSOT, libs.versions.toml に固定
          - "2.0.21"  # latest 2.0.x patch
          # === 2.1.x track ===
          - "2.1.0"
          - "2.1.21"  # latest 2.1.x patch
          # === 2.2.x track (compat-k210 が 2.2.x で compile 通ることを検証) ===
          - "2.2.0"
          - "2.2.21"
          # === 2.3.x track (latest stable minor on 2026-05-14) ===
          - "2.3.0"
          - "2.3.21"
          # === pre-release (1 つだけ) ===
          - "2.4.0-RC"
        include:
          # ------------------------------------------------------------------
          # Stable tier (failable=false) — Kotlin 2.0.0 baseline のみ厳密
          # PASS を要求する。 それ以外の version は experimental (= continue-
          # on-error で fail を許容、 ただし matrix の継続には影響しない)。
          #
          # 2.0.21+ を stable から外す理由:
          #   - D1 drift (FirLiteralExpression<T> → FirLiteralExpression) が
          #     2.0.21 で発生。 `compat-k200` の compile が 2.0.21 native
          #     classpath では落ちる (本ローカルで実機確認済)。
          #   - これは既知 drift で、 `compat-k210` 側が 2.1.x baseline と
          #     して既に absorb 済。
          #   - 既存 plugin の出荷 artifact は **shadowJar 内に
          #     `compat-k200` (2.0.0 baseline) + `compat-k210` (2.1.0 baseline)
          #     を bundle して** いるため、 consumer の Kotlin が 2.0.21 でも
          #     `compat-k210` が選ばれる (resolveFactory の minVersion 選択
          #     ロジック)。 つまり **plugin の出荷 artifact 自体は 2.0.21+
          #     consumer で動く**。 ただし CI 上で `compat-k200` を 2.0.21
          #     native でビルドしようとすると drift が露呈する、 という
          #     CI 用の構造的制約 (= experimental tier で許容)。
          # ------------------------------------------------------------------
          - kotlin: "2.0.0"
            ksp: "2.0.0-1.0.24"
            experimental: false

          # ------------------------------------------------------------------
          # Experimental tier (failable=true) — drift 観察用。
          # kctfork 0.5.1 は kotlin-compiler-
          # embeddable:2.0.0 を transitive に持つため、 newer Kotlin baseline
          # では test classpath 上の compiler-embeddable 2.0.0 と Gradle 側の
          # Kotlin (matrix value) が混在する。 大部分の build/test は
          # それでも動くが、 一部 spike テスト等で fail することがある。
          # ------------------------------------------------------------------
          - kotlin: "2.0.21"
            ksp: "2.0.21-1.0.28"
            experimental: true
          - kotlin: "2.1.0"
            ksp: "2.1.0-1.0.29"
            experimental: true
          - kotlin: "2.1.21"
            ksp: "2.1.21-2.0.2"
            experimental: true
          - kotlin: "2.2.0"
            ksp: "2.2.0-2.0.2"
            experimental: true
          - kotlin: "2.2.21"
            ksp: "2.2.21-2.0.5"
            experimental: true
          - kotlin: "2.3.0"
            ksp: "2.3.0"
            experimental: true
          - kotlin: "2.3.21"
            ksp: "2.3.8"
            experimental: true
          - kotlin: "2.4.0-RC"
            ksp: "2.3.8"  # KSP 2.4.x 未 release のため最新 2.3.x で代用
            experimental: true

          # ------------------------------------------------------------------
          # JDK 21 の代表 cell (各 minor track の latest patch + pre-release)。
          # core stable tier (2.0.x) は jdk 17 only、 21 は experimental 扱い。
          # ------------------------------------------------------------------
          - os: "ubuntu-latest"
            jdk: "21"
            kotlin: "2.0.21"
            ksp: "2.0.21-1.0.28"
            experimental: true
          - os: "ubuntu-latest"
            jdk: "21"
            kotlin: "2.1.21"
            ksp: "2.1.21-2.0.2"
            experimental: true
          - os: "ubuntu-latest"
            jdk: "21"
            kotlin: "2.3.21"
            ksp: "2.3.8"
            experimental: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.jdk }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.jdk }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      # ---------------------------------------------------------------------
      # libs.versions.toml の `kotlin` と `ksp` を matrix cell に追従させる。
      # SSOT 維持の観点で 2.0.0 base (= 現状値) の cell では編集しない。
      # 正規表現は **任意の version 文字列** に generalize し、 将来 patch
      # level を増やす際の編集を不要にする (例: "2\.0\.0" 固定 → ".*")。
      # ---------------------------------------------------------------------
      - name: Override Kotlin / KSP version for matrix cell
        if: matrix.kotlin != '2.0.0'
        run: |
          set -eu
          sed -i -E "s/^kotlin = \"[0-9].*\"$/kotlin = \"${{ matrix.kotlin }}\"/" gradle/libs.versions.toml
          sed -i -E "s/^ksp = \"[0-9].*\"$/ksp = \"${{ matrix.ksp }}\"/" gradle/libs.versions.toml
          echo "--- libs.versions.toml (after override) ---"
          head -20 gradle/libs.versions.toml

      - name: Run unit + KMP integration tests (jvm target)
        continue-on-error: ${{ matrix.experimental }}
        run: |
          ./gradlew \
            :compiler-plugin:test \
            :compiler-plugin:compat:test \
            :compiler-plugin:compat-k200:build \
            :gradle-plugin:test \
            :integration-test:test-jvm:test \
            :integration-test:test-kmp:jvmTest \
            --no-configuration-cache \
            --stacktrace

      # TestKit + fixture project による真の E2E。 別 step に分けて
      # CI ログを読みやすくする。
      - name: Run Gradle plugin E2E tests (TestKit)
        continue-on-error: ${{ matrix.experimental }}
        run: |
          ./gradlew \
            :integration-test:test-gradle-plugin:test \
            --no-configuration-cache \
            --stacktrace

  extras:
    name: "extras (compat-k210 + non-JVM KMP targets)"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      # Kotlin 2.1.x 向け compat module の compile-only check。
      # 2.1.x native API (top-level `IrCallImpl(...)` factory /
      # `IrConstructorCallImpl.Companion.fromSymbolOwner` 拡張 /
      # `IrConstKind` 非ジェネリック化 など) との API 整合を CI で保証する。
      - name: Compile-check compat-k210 (Kotlin 2.1.x)
        run: |
          ./gradlew \
            :compiler-plugin:compat-k210:build \
            --no-configuration-cache \
            --stacktrace

      # 非 JVM target の sanity (compile success レベル)。
      # 目的は「全 target で IR transformer の compile が
      # 通る」ことの確認。 `:linuxX64Test` / `:jsTest` / `:wasmJsTest` は
      # link + ランタイム実行まで走り、 GitHub-hosted runner の Konan cache
      # 整合性問題 (`platform.builtin is cached but its dependency isn't:
      # stdlib`) で恒常的に link fail する。 plugin の機能カバレッジは
      # JVM 系の integration test で確認済なので、 非 JVM target は
      # `compileTestKotlin*` で compile が通ることを確認するに留める。
      - name: Compile non-JVM KMP target test sources
        run: |
          ./gradlew \
            :integration-test:test-kmp:compileTestKotlinLinuxX64 \
            :integration-test:test-kmp:compileTestKotlinJs \
            :integration-test:test-kmp:compileTestKotlinWasmJs \
            --no-configuration-cache \
            --stacktrace

      - name: Assemble all non-Apple KMP targets
        run: |
          ./gradlew \
            :integration-test:test-kmp:assemble \
            --no-configuration-cache \
            --stacktrace
