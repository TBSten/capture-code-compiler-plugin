name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  # ---------------------------------------------------------------------------
  # core-matrix: Kotlin × JDK の全 stable + 最新 pre-release を回す主要 matrix。
  #
  # task-082 で experimental tier を撤廃し、 全 cell を stable tier に統一した。
  # 2.4.0-RC (pre-release) と JDK 21 cell も含めて全 cell が fail-on-error。
  # ある cell が fail すれば workflow も fail する。
  #
  # 構造解決済みの drift:
  #   - D1 drift (FirLiteralExpression 型パラ削除): compat-k210 で absorb
  #   - kctfork transitive (kotlin-compiler-embeddable:2.0.0): task-066 で
  #     compat module 別に test execution split
  #   - CompilerPluginRegistrar legacy-load incompat: task-078 で吸収
  #   - fullyExpandedType drift: task-080 で reflection shim 経由で吸収
  #
  # JDK は 17 を baseline、 21 は代表 versions の sanity 用 cell として追加。
  # 各 cell の `ksp` 値は Kotlin version に追従する必要がある (Kotlin 2.0.0
  # baseline 用 KSP は 2.2.x 以降では `too old` エラーで refuse される) ため、
  # matrix `include` で kotlin → ksp の version mapping を明示する。
  # ---------------------------------------------------------------------------
  core-matrix:
    name: "core (kotlin=${{ matrix.kotlin }}, jdk=${{ matrix.jdk }})"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest"]
        jdk: ["17"]
        kotlin:
          # === 2.0.x track === (compat-k200 baseline)
          - "2.0.0"   # base — SSOT, libs.versions.toml に固定
          - "2.0.10"  # task-047: compat-k200 が 2.0.10 native でも PASS
          - "2.0.20"  # task-067 retry: compat-k210 が D1 drift 吸収
          - "2.0.21"  # latest 2.0.x patch
          # === 2.1.x track === (compat-k210 baseline)
          - "2.1.0"
          - "2.1.10"  # task-067 retry: kctfork split で transitive 不整合解消
          - "2.1.20"
          - "2.1.21"  # latest 2.1.x patch
          # === 2.2.x track === (compat-k220 baseline)
          - "2.2.0"
          - "2.2.10"
          - "2.2.20"
          - "2.2.21"
          # === 2.3.x track === (compat-k230 baseline、 task-078 で legacy-load 修正)
          - "2.3.0"
          - "2.3.10"
          - "2.3.20"
          - "2.3.21"
          # === pre-release === (compat-k240rc baseline)
          - "2.4.0-RC"
        include:
          # ------------------------------------------------------------------
          # 全 cell stable tier (task-082): 2.0.0 〜 2.3.21 全 stable patch +
          # 2.4.0-RC pre-release を一律 fail-on-error で扱う。
          #
          # 構造的に解決済の問題:
          #   - D1 drift (FirLiteralExpression<T> → FirLiteralExpression、
          #     2.0.20 で introduction): compat-k210 が absorb。
          #     resolveFactory の minVersion 選択で 2.0.20+ consumer は
          #     compat-k210 を選ぶ。
          #   - kctfork transitive (kotlin-compiler-embeddable:2.0.0 が
          #     classpath に紛れ込む): task-066 で test execution split
          #     (2.0.x: compat-k200/test、 2.1.x+: compat-k210/test)。
          #   - CompilerPluginRegistrar legacy-load incompat (2.3.x+):
          #     task-078 で META-INF/services bundle + supportsK2 を吸収。
          # ------------------------------------------------------------------
          - kotlin: "2.0.0"
            ksp: "2.0.0-1.0.24"
          - kotlin: "2.0.10"
            ksp: "2.0.10-1.0.24"
          - kotlin: "2.0.20"
            ksp: "2.0.20-1.0.24"
          - kotlin: "2.0.21"
            ksp: "2.0.21-1.0.28"
          - kotlin: "2.1.0"
            ksp: "2.1.0-1.0.29"
          - kotlin: "2.1.10"
            ksp: "2.1.10-1.0.31"
          - kotlin: "2.1.20"
            ksp: "2.1.20-2.0.1"
          - kotlin: "2.1.21"
            ksp: "2.1.21-2.0.2"
          - kotlin: "2.2.0"
            ksp: "2.2.0-2.0.2"
          - kotlin: "2.2.10"
            ksp: "2.2.10-2.0.2"
          - kotlin: "2.2.20"
            ksp: "2.2.20-2.0.4"
          - kotlin: "2.2.21"
            ksp: "2.2.21-2.0.5"
          - kotlin: "2.3.0"
            ksp: "2.3.0"
          - kotlin: "2.3.10"
            ksp: "2.3.8"  # KSP 2.3.10 native 未 release のため最新 2.3.x で代用
          - kotlin: "2.3.20"
            ksp: "2.3.8"  # KSP 2.3.20 native 未 release のため最新 2.3.x で代用
          - kotlin: "2.3.21"
            ksp: "2.3.8"
          - kotlin: "2.4.0-RC"
            ksp: "2.3.8"  # KSP 2.4.x 未 release のため最新 2.3.x で代用

          # ------------------------------------------------------------------
          # JDK 21 の代表 cell (各 minor track の latest patch + pre-release)。
          # task-082 以降は JDK 21 cell も stable tier として扱う。
          # ------------------------------------------------------------------
          - os: "ubuntu-latest"
            jdk: "21"
            kotlin: "2.0.21"
            ksp: "2.0.21-1.0.28"
          - os: "ubuntu-latest"
            jdk: "21"
            kotlin: "2.1.21"
            ksp: "2.1.21-2.0.2"
          - os: "ubuntu-latest"
            jdk: "21"
            kotlin: "2.3.21"
            ksp: "2.3.8"
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.jdk }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.jdk }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      # ---------------------------------------------------------------------
      # libs.versions.toml の `kotlin` と `ksp` を matrix cell に追従させる。
      # SSOT 維持の観点で 2.0.0 base (= 現状値) の cell では編集しない。
      # 正規表現は **任意の version 文字列** に generalize し、 将来 patch
      # level を増やす際の編集を不要にする (例: "2\.0\.0" 固定 → ".*")。
      # ---------------------------------------------------------------------
      - name: Override Kotlin / KSP version for matrix cell
        if: matrix.kotlin != '2.0.0'
        run: |
          set -eu
          sed -i -E "s/^kotlin = \"[0-9].*\"$/kotlin = \"${{ matrix.kotlin }}\"/" gradle/libs.versions.toml
          sed -i -E "s/^ksp = \"[0-9].*\"$/ksp = \"${{ matrix.ksp }}\"/" gradle/libs.versions.toml
          echo "--- libs.versions.toml (after override) ---"
          head -20 gradle/libs.versions.toml

      # ---------------------------------------------------------------------
      # plugin 本体 (`:compiler-plugin:test`) は kctfork 0.5.1 が
      # kotlin-compiler-embeddable:2.0.0 を transitive に持つため、 Kotlin
      # 2.1.0+ の native classpath では `NoSuchMethodError` が発生する。
      # baseline (2.0.0) では従来通り `:compiler-plugin:test` +
      # `:compiler-plugin:compat-k200:test` (compat module の ServiceLoader
      # sanity) を実行し、 2.0.10+ では kctfork (kotlin-compiler-embeddable
      # 2.0.0 transitive) と consumer kotlin (2.0.20+ で D1 drift
      # `FirLiteralExpression` 型パラ削除) が混在して fail するため
      # `:compiler-plugin:test` は外し、 `:compat-k200:test` (compat module
      # の ServiceLoader sanity) のみ実行する。 plugin 実機動作は shadowJar
      # 経由で compat-k200 (2.0.0 native binary) が選ばれるため
      # `:integration-test:test-jvm:test` が正常に検証する。
      # 2.1.0+ では `:compiler-plugin:compat-k210:test` に限定して
      # compat-k210 の API 整合を検証する (task-065 で compat module 別の
      # test execution split 済)。
      # ---------------------------------------------------------------------
      - name: Run unit + KMP integration tests (jvm target)
        run: |
          case "${{ matrix.kotlin }}" in
            2.0.0)
              plugin_tests=":compiler-plugin:test :compiler-plugin:compat-k200:test"
              ;;
            2.0.10)
              # 2.0.10 では `BuildersKt` が未導入のため compat-k202 は dispatch されず、
              # compat-k200 が引き続き使われる (task-081 で minVersion = "2.0.20" に
              # 設定したため)。 task-080 の fullyExpandedType reflection shim 経由で
              # drift-safe。
              plugin_tests=":compiler-plugin:compat-k200:test"
              ;;
            2.0.*)
              # 2.0.20 / 2.0.21 patch では compat-k202 (Factory.minVersion = "2.0.20")
              # が dispatch される。 task-081 で IrVarargImplKt / IrConstImplKt /
              # IrGetEnumValueImplKt の top-level factory 削除や BuildersKt 導入を
              # 2.0.21 native binary で吸収。
              plugin_tests=":compiler-plugin:compat-k202:test"
              ;;
            2.1.*)
              plugin_tests=":compiler-plugin:compat-k210:test"
              ;;
            2.2.*)
              plugin_tests=":compiler-plugin:compat-k220:test"
              ;;
            2.3.*)
              # task-088 / task-089: compat-k230 は K230CaptureCodeDiagnostics の
              # static init 循環依存 regression test を含む。 2.3.x cell で必ず
              # `:compat-k230:test` を実行することで再発を即捕捉する。
              plugin_tests=":compiler-plugin:compat-k230:test"
              ;;
            2.4.0-RC)
              # task-089: K240Rc も同じ static init regression test を持つ。
              plugin_tests=":compiler-plugin:compat-k240rc:test"
              ;;
            *)
              # 想定外の version (= 新 minor 等) は最寄りの compat-k210 で sanity。
              plugin_tests=":compiler-plugin:compat-k210:test"
              ;;
          esac
          ./gradlew \
            $plugin_tests \
            :gradle-plugin:test \
            :integration-test:test-jvm:test \
            :integration-test:test-kmp:jvmTest \
            --no-configuration-cache \
            --stacktrace

      # TestKit + fixture project による真の E2E。 別 step に分けて
      # CI ログを読みやすくする。
      - name: Run Gradle plugin E2E tests (TestKit)
        run: |
          ./gradlew \
            :integration-test:test-gradle-plugin:test \
            --no-configuration-cache \
            --stacktrace

  extras:
    name: "extras (compat-k210 + non-JVM KMP targets)"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      # Kotlin 2.1.x 向け compat module の compile-only check。
      # 2.1.x native API (top-level `IrCallImpl(...)` factory /
      # `IrConstructorCallImpl.Companion.fromSymbolOwner` 拡張 /
      # `IrConstKind` 非ジェネリック化 など) との API 整合を CI で保証する。
      - name: Compile-check compat-k210 (Kotlin 2.1.x)
        run: |
          ./gradlew \
            :compiler-plugin:compat-k210:build \
            --no-configuration-cache \
            --stacktrace

      # 非 JVM target の sanity (compile success レベル)。
      # 目的は「全 target で IR transformer の compile が
      # 通る」ことの確認。 `:linuxX64Test` / `:jsTest` / `:wasmJsTest` は
      # link + ランタイム実行まで走り、 GitHub-hosted runner の Konan cache
      # 整合性問題 (`platform.builtin is cached but its dependency isn't:
      # stdlib`) で恒常的に link fail する。 plugin の機能カバレッジは
      # JVM 系の integration test で確認済なので、 非 JVM target は
      # `compileTestKotlin*` で compile が通ることを確認するに留める。
      - name: Compile non-JVM KMP target test sources
        run: |
          ./gradlew \
            :integration-test:test-kmp:compileTestKotlinLinuxX64 \
            :integration-test:test-kmp:compileTestKotlinJs \
            :integration-test:test-kmp:compileTestKotlinWasmJs \
            --no-configuration-cache \
            --stacktrace

      - name: Assemble all non-Apple KMP targets
        run: |
          ./gradlew \
            :integration-test:test-kmp:assemble \
            --no-configuration-cache \
            --stacktrace

      # task-085: `:annotation` の android target (AAR) 出力を検証する。
      # GitHub-hosted ubuntu runner には Android SDK が pre-installed
      # (`ANDROID_HOME=/usr/local/lib/android/sdk`) されており、 ライセンスも
      # 受諾済なので追加 setup-android action は不要。
      - name: Assemble :annotation android target (AAR)
        run: |
          ./gradlew \
            :annotation:assembleRelease \
            --no-configuration-cache \
            --stacktrace

  # ---------------------------------------------------------------------------
  # apple-targets: macos-latest runner で Apple native target
  # (iosArm64 / iosSimulatorArm64 / iosX64 / macosArm64 / macosX64) の
  # compile を検証する。 task-068 で追加。
  #
  # `enableAppleTargets=true` は :annotation / :integration-test:test-kmp
  # の build.gradle.kts で opt-in されており、 Xcode (= macos runner) が
  # 必須となるため core-matrix からは独立した job として分離する。
  #
  # 目的:
  #   - macOS でのみ顕在化する drift (Konan cache / Apple SDK API mismatch
  #     / iOS-only コンパイラフラグなど) を CI で継続検出する。
  #
  # trigger:
  #   - push / pull_request 両方で走らせる (本 ticket scope では cost を
  #     絞らず、 まず実証フェーズに置く)。 cost が問題になった場合は
  #     後続 ticket で nightly / ready_for_review に絞る。
  # ---------------------------------------------------------------------------
  apple-targets:
    name: "Apple native targets (Xcode)"
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Assemble Apple targets (iOS / macOS)
        run: |
          ./gradlew \
            :annotation:assemble \
            :integration-test:test-kmp:assemble \
            -PenableAppleTargets=true \
            --no-configuration-cache \
            --stacktrace
