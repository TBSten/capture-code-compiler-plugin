# ----------------------------------------------------------------------------
# capture-code-compiler-plugin CI workflow
#
# 本 workflow は **impl-plan.md §5.2 (CI matrix Phase 4 以降)** に従い、
# サポート対象の全 Kotlin バージョン × JDK × OS で全 test を回す matrix を
# 構築する (task-032)。
#
# ## 構造
#
# 2 job 構成:
#
# 1. `core-matrix` job (Kotlin × JDK の matrix)
#    - matrix.kotlin: ["2.0.0", "2.1.0"]
#    - matrix.jdk: ["17", "21"]
#    - matrix.os: ["ubuntu-latest"]
#    - 各 cell で unit + integration (JVM 系) を回す:
#       :compiler-plugin:test
#       :compiler-plugin:compat:test
#       :compiler-plugin:compat-k200:build
#       :gradle-plugin:test
#       :integration-test:test-jvm:test
#       :integration-test:test-kmp:jvmTest
#       :integration-test:test-gradle-plugin:test
#    - Kotlin 2.0.0 cell は **stable tier** (失敗で fail)
#    - Kotlin 2.1.0 cell は **experimental tier** (continue-on-error)
#       - task-031 完了メモ参照: kctfork 0.5.1 が
#         kotlin-compiler-embeddable:2.0.0 を transitive に持つため、
#         Kotlin 2.1.0 base での integration-test では classpath 衝突
#         リスクあり。 kctfork 0.10.x+ への bump は本 ticket scope 外。
#       - 2.1.0 native API の compile 整合は別 step (compat-k210:build) で
#         確保しているので、 全 105 ケース PASS は将来 task (kctfork bump 後) で。
#    - libs.versions.toml の `kotlin = "2.0.0"` を sed で
#      matrix.kotlin に書き換えるシンプル戦略 (案 A)。 元の SSOT は 2.0.0 のまま。
#
# 2. `extras` job (Kotlin 2.0.0 / JDK 17 / ubuntu-latest)
#    - core-matrix で扱わない以下を担当:
#       :compiler-plugin:compat-k210:build  (Kotlin 2.1.x native API compile-only)
#       :integration-test:test-kmp:linuxX64Test
#       :integration-test:test-kmp:jsTest
#       :integration-test:test-kmp:wasmJsTest
#       :integration-test:test-kmp:assemble
#    - これらは Kotlin / JDK 軸ではなく target / API surface 軸の検証なので、
#      matrix と分離して 1 cell で実行 (CI 時間節約)。
#
# ## Apple native target
#
# `enableAppleTargets=false` (default) のため Xcode 不要。
# Apple matrix (macos-latest + enableAppleTargets=true) は Phase 5
# (task-038 release workflow) で nightly schedule 等に組み込む。
#
# ## task tasks 列挙の理由
#
# `./gradlew check` を避ける理由:
#   - `:integration-test:test-kmp:mingwX64Test` は ubuntu/macOS で実行できない
#     (Windows binary を実行できない)。 `:integration-test:test-kmp:check` に
#     含まれてしまうため、 明示的に PR 検証対象の task を列挙する。
#   - macOS host では `:integration-test:test-kmp:xcodeVersion` (KGP が
#     applyDefaultHierarchyTemplate() の余波で生成する) が Xcode 必須な
#     ため check がコケる。
# ----------------------------------------------------------------------------
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  core-matrix:
    name: "core (kotlin=${{ matrix.kotlin }}, jdk=${{ matrix.jdk }})"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest"]
        jdk: ["17", "21"]
        kotlin: ["2.0.0", "2.1.0"]
        include:
          # Kotlin 2.0.0 は stable tier (失敗で fail)
          - kotlin: "2.0.0"
            experimental: false
          # Kotlin 2.1.0 は experimental tier (continue-on-error)
          # task-031 完了メモ: kctfork 0.5.1 が kotlin-compiler-embeddable:2.0.0
          # を transitive に持つため、 Kotlin 2.1.0 base では classpath 衝突
          # リスクあり。 kctfork bump は別 ticket。
          - kotlin: "2.1.0"
            experimental: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.jdk }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.jdk }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      # Kotlin 2.0.0 cell では libs.versions.toml を一切触らない (= SSOT)。
      # 2.1.0 cell でのみ kotlin version を sed で書き換える。
      # ksp version は kotlin に追従する必要があるが、 本 plugin は
      # compiler-plugin module で AutoService を使うのみで KSP version が
      # 古くても 2.1.0 Kotlin と互換 (KSP 2.0.0-1.0.24 は kotlin 2.1.x で
      # 動作するため). 明示的に bump はしない。
      - name: Override Kotlin version for matrix cell
        if: matrix.kotlin != '2.0.0'
        run: |
          sed -i "s/^kotlin = \"2\.0\.0\"$/kotlin = \"${{ matrix.kotlin }}\"/" gradle/libs.versions.toml
          echo "--- libs.versions.toml (after override) ---"
          head -20 gradle/libs.versions.toml

      - name: Run unit + KMP integration tests (jvm target)
        continue-on-error: ${{ matrix.experimental }}
        run: |
          ./gradlew \
            :compiler-plugin:test \
            :compiler-plugin:compat:test \
            :compiler-plugin:compat-k200:build \
            :gradle-plugin:test \
            :integration-test:test-jvm:test \
            :integration-test:test-kmp:jvmTest \
            --no-configuration-cache \
            --stacktrace

      # task-040: TestKit + fixture project による真の E2E。 別 step に分けて
      # CI ログを読みやすくする。
      - name: Run Gradle plugin E2E tests (TestKit)
        continue-on-error: ${{ matrix.experimental }}
        run: |
          ./gradlew \
            :integration-test:test-gradle-plugin:test \
            --no-configuration-cache \
            --stacktrace

  extras:
    name: "extras (compat-k210 + non-JVM KMP targets)"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      # task-031: Kotlin 2.1.x 向け compat module の compile-only check。
      # 2.1.x native API (top-level `IrCallImpl(...)` factory /
      # `IrConstructorCallImpl.Companion.fromSymbolOwner` 拡張 /
      # `IrConstKind` 非ジェネリック化 など) との API 整合を CI で保証する。
      - name: Compile-check compat-k210 (Kotlin 2.1.x)
        run: |
          ./gradlew \
            :compiler-plugin:compat-k210:build \
            --no-configuration-cache \
            --stacktrace

      # 非 JVM target の sanity (compile + 一部 runtime call)。
      - name: Compile + sanity-run non-JVM KMP targets
        run: |
          ./gradlew \
            :integration-test:test-kmp:linuxX64Test \
            :integration-test:test-kmp:jsTest \
            :integration-test:test-kmp:wasmJsTest \
            --no-configuration-cache \
            --stacktrace

      - name: Assemble all non-Apple KMP targets
        run: |
          ./gradlew \
            :integration-test:test-kmp:assemble \
            --no-configuration-cache \
            --stacktrace
