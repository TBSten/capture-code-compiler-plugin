name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  # ---------------------------------------------------------------------------
  # core-matrix: Kotlin × JDK の全 stable + 最新 pre-release を回す主要 matrix。
  #
  # Kotlin 2.0.0 以降の全 minor track (initial + latest patch
  # = 代表 2 cell × 4 tracks = 8 stable) + 最新 pre-release 1 つを含める。
  # 各 minor track の patch level 全数 (例 2.0.10/2.0.20) は CI コストの観点
  # から省略する (代表 patch level だけで drift 観察として十分)。
  #
  # JDK は 17 を stable tier、 21 は experimental tier (代表 versions のみ)。
  #
  # 各 cell の `ksp` 値は Kotlin version に追従する必要がある (Kotlin 2.0.0
  # baseline 用 KSP は 2.2.x 以降では `too old` エラーで refuse される) ため、
  # matrix `include` で kotlin → ksp の version mapping を明示する。
  # ---------------------------------------------------------------------------
  core-matrix:
    name: "core (kotlin=${{ matrix.kotlin }}, jdk=${{ matrix.jdk }})"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest"]
        jdk: ["17"]
        kotlin:
          # === 2.0.x track ===
          - "2.0.0"   # base — SSOT, libs.versions.toml に固定
          - "2.0.10"  # stable tier (task-047): compat-k200 が 2.0.10 native でも PASS
          - "2.0.20"  # experimental (task-048): D1 drift (FirLiteralExpression generics) 発生
          - "2.0.21"  # latest 2.0.x patch
          # === 2.1.x track ===
          - "2.1.0"
          - "2.1.10"  # experimental (task-051): kctfork transitive embeddable 2.0.0 と drift
          - "2.1.20"  # experimental (task-052)
          - "2.1.21"  # latest 2.1.x patch
          # === 2.2.x track (compat-k210 が 2.2.x で compile 通ることを検証) ===
          - "2.2.0"
          - "2.2.10"  # experimental (task-055)
          - "2.2.20"  # experimental (task-056)
          - "2.2.21"
          # === 2.3.x track (latest stable minor on 2026-05-14) ===
          - "2.3.0"
          - "2.3.10"  # experimental (task-059)
          - "2.3.20"  # experimental (task-060)
          - "2.3.21"
          # === pre-release (1 つだけ) ===
          - "2.4.0-RC"
        include:
          # ------------------------------------------------------------------
          # Stable tier (failable=false) — Kotlin 2.0.0 baseline のみ厳密
          # PASS を要求する。 それ以外の version は experimental (= continue-
          # on-error で fail を許容、 ただし matrix の継続には影響しない)。
          #
          # 2.0.20+ を stable から外す理由:
          #   - D1 drift (FirLiteralExpression<T> → FirLiteralExpression) が
          #     **2.0.20** で発生 (task-048 ローカル実機検証で確定。 task-047
          #     時点の comment では 2.0.21 と帰属していたが、 patch 単位の
          #     計測で 2.0.20 が真の drift introduction patch であることが
          #     判明)。 `compat-k200` の compile が 2.0.20+ native classpath
          #     では落ちる。
          #   - これは既知 drift で、 `compat-k210` 側が 2.1.x baseline と
          #     して既に absorb 済。
          #   - 既存 plugin の出荷 artifact は **shadowJar 内に
          #     `compat-k200` (2.0.0 baseline) + `compat-k210` (2.1.0 baseline)
          #     を bundle して** いるため、 consumer の Kotlin が 2.0.20+ でも
          #     `compat-k210` が選ばれる (resolveFactory の minVersion 選択
          #     ロジック)。 つまり **plugin の出荷 artifact 自体は 2.0.20+
          #     consumer で動く**。 ただし CI 上で `compat-k200` を 2.0.20
          #     native でビルドしようとすると drift が露呈する、 という
          #     CI 用の構造的制約 (= experimental tier で許容)。
          # ------------------------------------------------------------------
          - kotlin: "2.0.0"
            ksp: "2.0.0-1.0.24"
            experimental: false
          # 2.0.10: D1 drift (FirLiteralExpression<T> generics) は 2.0.21 で
          # 初めて発生するため、 2.0.10 はまだ `compat-k200` native build が
          # 通る。 task-047 で実機検証済 → stable tier に追加。
          - kotlin: "2.0.10"
            ksp: "2.0.10-1.0.24"
            experimental: false

          # ------------------------------------------------------------------
          # Stable tier 拡張 (task-067) — kctfork transitive 不整合は
          # task-066 で ci 側の test execution を Kotlin minor 別に分岐
          # (`2.0.* → :compiler-plugin:test + compat-k200:test`,
          #  `それ以外 → :compiler-plugin:compat-k210:test`) させることで
          # 回避済。 これにより 2.0.20+ の各 patch 〜 2.3.21 までを全て
          # stable tier (`experimental: false`) に昇格できる。
          # 2.4.0-RC のみ pre-release 用 warn ポリシーとして experimental
          # tier に維持する。
          # ------------------------------------------------------------------
          - kotlin: "2.0.20"
            ksp: "2.0.20-1.0.24"
            experimental: false
          - kotlin: "2.0.21"
            ksp: "2.0.21-1.0.28"
            experimental: false
          - kotlin: "2.1.0"
            ksp: "2.1.0-1.0.29"
            experimental: false
          - kotlin: "2.1.10"
            ksp: "2.1.10-1.0.31"
            experimental: false
          - kotlin: "2.1.20"
            ksp: "2.1.20-2.0.1"
            experimental: false
          - kotlin: "2.1.21"
            ksp: "2.1.21-2.0.2"
            experimental: false
          - kotlin: "2.2.0"
            ksp: "2.2.0-2.0.2"
            experimental: false
          - kotlin: "2.2.10"
            ksp: "2.2.10-2.0.2"
            experimental: false
          - kotlin: "2.2.20"
            ksp: "2.2.20-2.0.4"
            experimental: false
          - kotlin: "2.2.21"
            ksp: "2.2.21-2.0.5"
            experimental: false
          - kotlin: "2.3.0"
            ksp: "2.3.0"
            experimental: false
          - kotlin: "2.3.10"
            ksp: "2.3.8"  # KSP 2.3.10 native 未 release のため最新 2.3.x で代用
            experimental: false
          - kotlin: "2.3.20"
            ksp: "2.3.8"  # KSP 2.3.20 native 未 release のため最新 2.3.x で代用
            experimental: false
          - kotlin: "2.3.21"
            ksp: "2.3.8"
            experimental: false

          # ------------------------------------------------------------------
          # Experimental tier (failable=true) — pre-release 用 warn ポリシー。
          # ------------------------------------------------------------------
          - kotlin: "2.4.0-RC"
            ksp: "2.3.8"  # KSP 2.4.x 未 release のため最新 2.3.x で代用
            experimental: true

          # ------------------------------------------------------------------
          # JDK 21 の代表 cell (各 minor track の latest patch)。
          # task-067 で全 stable Kotlin patch を JDK 17 で stable 昇格させた
          # のに合わせ、 JDK 21 cell も同様に stable tier (`experimental:
          # false`) に昇格する。
          # ------------------------------------------------------------------
          - os: "ubuntu-latest"
            jdk: "21"
            kotlin: "2.0.21"
            ksp: "2.0.21-1.0.28"
            experimental: false
          - os: "ubuntu-latest"
            jdk: "21"
            kotlin: "2.1.21"
            ksp: "2.1.21-2.0.2"
            experimental: false
          - os: "ubuntu-latest"
            jdk: "21"
            kotlin: "2.3.21"
            ksp: "2.3.8"
            experimental: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.jdk }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.jdk }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      # ---------------------------------------------------------------------
      # libs.versions.toml の `kotlin` と `ksp` を matrix cell に追従させる。
      # SSOT 維持の観点で 2.0.0 base (= 現状値) の cell では編集しない。
      # 正規表現は **任意の version 文字列** に generalize し、 将来 patch
      # level を増やす際の編集を不要にする (例: "2\.0\.0" 固定 → ".*")。
      # ---------------------------------------------------------------------
      - name: Override Kotlin / KSP version for matrix cell
        if: matrix.kotlin != '2.0.0'
        run: |
          set -eu
          sed -i -E "s/^kotlin = \"[0-9].*\"$/kotlin = \"${{ matrix.kotlin }}\"/" gradle/libs.versions.toml
          sed -i -E "s/^ksp = \"[0-9].*\"$/ksp = \"${{ matrix.ksp }}\"/" gradle/libs.versions.toml
          echo "--- libs.versions.toml (after override) ---"
          head -20 gradle/libs.versions.toml

      # ---------------------------------------------------------------------
      # plugin 本体 (`:compiler-plugin:test`) は kctfork 0.5.1 が
      # kotlin-compiler-embeddable:2.0.0 を transitive に持つため、 Kotlin
      # 2.1.0+ の native classpath では `NoSuchMethodError` が発生する。
      # baseline (2.0.x) では従来通り `:compiler-plugin:test` +
      # `:compiler-plugin:compat-k200:test` (compat module の ServiceLoader
      # sanity) を実行し、 2.1.0+ では `:compiler-plugin:compat-k210:test`
      # に限定して compat-k210 の API 整合を検証する。
      # task-065 で `compat-k200/test` と `compat-k210/test` が独立に走る
      # ように分離済み → 本 step ではその切替を Kotlin minor で行う。
      # ---------------------------------------------------------------------
      - name: Run unit + KMP integration tests (jvm target)
        continue-on-error: ${{ matrix.experimental }}
        run: |
          case "${{ matrix.kotlin }}" in
            2.0.*)
              plugin_tests=":compiler-plugin:test :compiler-plugin:compat-k200:test"
              ;;
            *)
              plugin_tests=":compiler-plugin:compat-k210:test"
              ;;
          esac
          ./gradlew \
            $plugin_tests \
            :gradle-plugin:test \
            :integration-test:test-jvm:test \
            :integration-test:test-kmp:jvmTest \
            --no-configuration-cache \
            --stacktrace

      # TestKit + fixture project による真の E2E。 別 step に分けて
      # CI ログを読みやすくする。
      - name: Run Gradle plugin E2E tests (TestKit)
        continue-on-error: ${{ matrix.experimental }}
        run: |
          ./gradlew \
            :integration-test:test-gradle-plugin:test \
            --no-configuration-cache \
            --stacktrace

  extras:
    name: "extras (compat-k210 + non-JVM KMP targets)"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      # Kotlin 2.1.x 向け compat module の compile-only check。
      # 2.1.x native API (top-level `IrCallImpl(...)` factory /
      # `IrConstructorCallImpl.Companion.fromSymbolOwner` 拡張 /
      # `IrConstKind` 非ジェネリック化 など) との API 整合を CI で保証する。
      - name: Compile-check compat-k210 (Kotlin 2.1.x)
        run: |
          ./gradlew \
            :compiler-plugin:compat-k210:build \
            --no-configuration-cache \
            --stacktrace

      # 非 JVM target の sanity (compile success レベル)。
      # 目的は「全 target で IR transformer の compile が
      # 通る」ことの確認。 `:linuxX64Test` / `:jsTest` / `:wasmJsTest` は
      # link + ランタイム実行まで走り、 GitHub-hosted runner の Konan cache
      # 整合性問題 (`platform.builtin is cached but its dependency isn't:
      # stdlib`) で恒常的に link fail する。 plugin の機能カバレッジは
      # JVM 系の integration test で確認済なので、 非 JVM target は
      # `compileTestKotlin*` で compile が通ることを確認するに留める。
      - name: Compile non-JVM KMP target test sources
        run: |
          ./gradlew \
            :integration-test:test-kmp:compileTestKotlinLinuxX64 \
            :integration-test:test-kmp:compileTestKotlinJs \
            :integration-test:test-kmp:compileTestKotlinWasmJs \
            --no-configuration-cache \
            --stacktrace

      - name: Assemble all non-Apple KMP targets
        run: |
          ./gradlew \
            :integration-test:test-kmp:assemble \
            --no-configuration-cache \
            --stacktrace

  # ---------------------------------------------------------------------------
  # apple-targets: macos-latest runner で Apple native target
  # (iosArm64 / iosSimulatorArm64 / iosX64 / macosArm64 / macosX64) の
  # compile を検証する。 task-068 で追加。
  #
  # `enableAppleTargets=true` は :annotation / :integration-test:test-kmp
  # の build.gradle.kts で opt-in されており、 Xcode (= macos runner) が
  # 必須となるため core-matrix からは独立した job として分離する。
  #
  # 目的:
  #   - macOS でのみ顕在化する drift (Konan cache / Apple SDK API mismatch
  #     / iOS-only コンパイラフラグなど) を CI で継続検出する。
  #
  # trigger:
  #   - push / pull_request 両方で走らせる (本 ticket scope では cost を
  #     絞らず、 まず実証フェーズに置く)。 cost が問題になった場合は
  #     後続 ticket で nightly / ready_for_review に絞る。
  # ---------------------------------------------------------------------------
  apple-targets:
    name: "Apple native targets (Xcode)"
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Assemble Apple targets (iOS / macOS)
        run: |
          ./gradlew \
            :annotation:assemble \
            :integration-test:test-kmp:assemble \
            -PenableAppleTargets=true \
            --no-configuration-cache \
            --stacktrace
