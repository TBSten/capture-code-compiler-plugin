# ----------------------------------------------------------------------------
# task-026 で導入した最小 CI workflow (Phase 3 合流ポイント)。
#
# 実行する task は以下。`./gradlew check` を避ける理由:
#   - `:integration-test:test-kmp:mingwX64Test` は ubuntu/macOS で実行できない
#     (Windows binary を実行できない)。 `:integration-test:test-kmp:check` に
#     含まれてしまうため、 明示的に PR 検証対象の task を列挙する。
#   - macOS host では `:integration-test:test-kmp:xcodeVersion` (KGP が
#     applyDefaultHierarchyTemplate() の余波で生成する) が Xcode 必須な
#     ため check がコケる。 ubuntu-latest なら xcodeVersion task は生成
#     されないが、 念のため明示的タスク指定の方式に統一する。
#
# 列挙対象:
#   - :compiler-plugin:test                  : FIR/IR extension の unit test
#   - :compiler-plugin:compat:test           : compat layer (capability)
#   - :compiler-plugin:compat-k200:build     : Kotlin 2.0.x 用 IR / FIR 実装の compile (task-030 v2)
#   - :compiler-plugin:compat-k210:build     : Kotlin 2.1.x 用 IR / FIR 実装の compile (task-031)
#                                              本 step で **2.1.0 native API での compile-only** を保証する。
#                                              実 dispatch が走る full integration test は task-032 で
#                                              CI matrix を完備した後に追加する。
#   - :gradle-plugin:test                    : Gradle plugin の sanity test
#                                              (ProjectBuilder で DSL 配線 + Kotlin version guard を verify)
#   - :integration-test:test-gradle-plugin:test
#                                            : TestKit + fixture project による
#                                              ユーザ実利用形態の真の E2E (task-040)
#   - :integration-test:test-jvm:test        : JVM-only 統合テスト (1〜100 ケース)
#   - :integration-test:test-kmp:jvmTest     : KMP 統合テスト (#101〜#105)
#   - :integration-test:test-kmp:linuxX64Test: linuxX64 sanity (ubuntu 上で実行可)
#   - :integration-test:test-kmp:jsTest      : js/Node sanity
#   - :integration-test:test-kmp:wasmJsTest  : wasmJs/Node sanity
#   - :integration-test:test-kmp:assemble    : 全 non-Apple target の compile success
#                                              (mingwX64 はリンクのみ、 実行はしない)
#
# Apple target は `enableAppleTargets=false` (default) のため Xcode 不要。
# 完全な Apple verify は Phase 4 task-032 (CI matrix で macos-latest 追加) で対応予定。
#
# ## Kotlin version matrix (task-031 で土台を整備、 task-032 で本運用)
#
# 現状 CI は **base project の Kotlin = 2.0.0** だけで全 test を回す。 [[task-031]] で
# `compat-k210` (Kotlin 2.1.x 向け) module を追加したため、 本 workflow には
# `:compiler-plugin:compat-k210:build` を含めて **compile-only での 2.1.x API 整合性** を保証する。
# 実 dispatch (= base project の Kotlin を 2.1.x に切り替えて全 105 ケースを通す) は
# kctfork 0.5.1 互換確認 + matrix job 追加が必要なため task-032 で対応する。
# ----------------------------------------------------------------------------
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      # macOS host だと KGP が `applyDefaultHierarchyTemplate()` 経由で
      # Apple 系 intermediate source set の metadata 計算のために `xcodeVersion`
      # task を test/assemble task の依存に注入することがある (ローカル開発時の
      # known issue)。 ubuntu-latest には Xcode/Apple toolchain が存在しないため、
      # KGP は xcodeVersion task を skip し、 以下のセットは問題なく走る。
      - name: Run unit + KMP integration tests (jvm target)
        run: |
          ./gradlew \
            :compiler-plugin:test \
            :compiler-plugin:compat:test \
            :compiler-plugin:compat-k200:build \
            :gradle-plugin:test \
            :integration-test:test-jvm:test \
            :integration-test:test-kmp:jvmTest \
            --no-configuration-cache \
            --stacktrace

      # task-031: Kotlin 2.1.x 向け compat module の compile-only check。 本 step は
      # `:compiler-plugin:compat-k210:build` のみを実行し、 2.1.x native API (top-level
      # `IrCallImpl(...)` factory / `IrConstructorCallImpl.Companion.fromSymbolOwner` 拡張 /
      # `IrConstKind` 非ジェネリック化 など) との API 整合を CI で保証する。
      # 実 dispatch (= base project の Kotlin を 2.1.x に切り替えた full integration test) は
      # kctfork 互換確認とともに task-032 で追加する。
      - name: Compile-check compat-k210 (Kotlin 2.1.x)
        run: |
          ./gradlew \
            :compiler-plugin:compat-k210:build \
            --no-configuration-cache \
            --stacktrace

      # task-040: TestKit + fixture project による真の E2E (`plugins { id(...) }` で
      # plugin apply するユーザ実利用形態を実 Gradle build で verify)。 子 Gradle build
      # を起動するため上の step より遅い (1 ケース 20-90 秒)。 別 step に分離して
      # CI ログを読みやすくする。
      - name: Run Gradle plugin E2E tests (TestKit)
        run: |
          ./gradlew \
            :integration-test:test-gradle-plugin:test \
            --no-configuration-cache \
            --stacktrace

      # 非 JVM target の sanity (compile + 一部 runtime call)。 別 step に
      # 分けているのは、 `assemble` と `*Test` を同じ Gradle invocation に
      # 入れると macOS では xcodeVersion task が injected されるため (ubuntu
      # では問題ないが、 future-proof のため分離)。
      - name: Compile + sanity-run non-JVM KMP targets
        run: |
          ./gradlew \
            :integration-test:test-kmp:linuxX64Test \
            :integration-test:test-kmp:jsTest \
            :integration-test:test-kmp:wasmJsTest \
            --no-configuration-cache \
            --stacktrace

      - name: Assemble all non-Apple KMP targets
        run: |
          ./gradlew \
            :integration-test:test-kmp:assemble \
            --no-configuration-cache \
            --stacktrace
